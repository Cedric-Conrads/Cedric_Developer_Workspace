<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Rechner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Mini Rechner</h1>
        
        <input type="number" id="zahl1" placeholder="Erste Zahl">
        <input type="number" id="zahl2" placeholder="Zweite Zahl">

        <div class="button-box">
        <button id="plus-btn">+</button>
        <button id="minus-btn">-</button>
        <button id="mal-btn">x</button>
        <button id="geteilt-btn">÷</button>
        <button id="reset-btn">C</button>
    </div>
   
    <h2 id="ergebnis">Ergebnis: 0</h2>


    <script src="script.js"></script>

</body>

</html>
