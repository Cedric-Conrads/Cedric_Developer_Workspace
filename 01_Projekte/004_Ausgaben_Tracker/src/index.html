<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ausgaben Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="app">

        <section class="hero">
            <p class="label">Budget · Ausgaben · Übersicht</p>
            <h1>Ausgaben Tracker</h1>
            <p class="subtitle">
                Trage deine Ausgaben ein und behalte deine Gesamtsumme im Blick.
            </p>
        </section>

        <section class="tracker-card">

            <div class="input-group">
                <label for="expense-name">Ausgabe</label>
                <input type="text" id="expense-name" placeholder="z.B. Einkaufen">
            </div>

            <div class="input-group">
                <label for="expense-amount">Betrag</label>
                <input type="number" id="expense-amount" placeholder="z.B. 25">
            </div>

            <button id="add-btn">Ausgabe hinzufügen</button>

            <p id="feedback" class="feedback"></p>

        </section>

        <section class="summary-card">
            <h2>Gesamt</h2>
            <p><span id="total">0</span> €</p>
        </section>

        <section class="list-card">
            <h2>Deine Ausgaben</h2>

            <ul id="expense-list">
                <!-- Hier kommen später die Ausgaben rein -->
            </ul>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
