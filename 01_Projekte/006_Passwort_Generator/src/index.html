<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Passwort Generator</h1>

        <p class="subtitle">
            Erstelle sichere Passwörter mit eigener Länge.
        </p>

        <div class="input-box">
            <label for="length">Passwortlänge</label>
            <input type="number" id="length" placeholder="z.B. 12">
        </div>

        <button id="generate-btn">
            Passwort generieren
        </button>

        <div class="output-box">
            <p id="password-output">
                Dein Passwort erscheint hier
            </p>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
